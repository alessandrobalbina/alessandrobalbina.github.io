name: Deploy static site

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Normalize OIDC audience
        run: |
          CLEAN_URL="$(echo "${ACTIONS_ID_TOKEN_REQUEST_URL}" | sed -E 's/([?&])audience=[^&]*&?/\1/g' | sed -E 's/[?&]$//')"
          echo "ACTIONS_ID_TOKEN_REQUEST_URL=${CLEAN_URL}&audience=https://github.com/${GITHUB_REPOSITORY_OWNER}" >> "$GITHUB_ENV"

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
